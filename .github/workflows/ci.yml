name: Retail Analytics CI

on:
  push:
    branches: ["main"]
  pull_request:
    branches: ["main"]

jobs:
  validate:
    runs-on: ubuntu-latest
    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Set up Python
        uses: actions/setup-python@v5
        with:
          python-version: "3.11"

      - name: Install dependencies
        run: |
          python -m pip install --upgrade pip
          pip install -r requirements.txt

      - name: Compile project
        run: python -m compileall src dashboard

      - name: Secret hygiene check
        run: |
          ! grep -R "github_pat_" .
          ! grep -R "AKIA[0-9A-Z]" .

